<!DOCTYPE html>
<html lang="en-US">
	<head>
		<meta charset="utf-8">
		<meta name="robots" content="noindex">
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
		<title>Bing Wallpaper API</title>
		<link rel="icon" href="https://www.bing.com/sa/simg/bing_p_rr_teal_min.ico">
	</head>
	<body>
		<img id="bg-img" class="bg-img" src="/api/1080p" alt="Bing Wallpaper">
		
		<div class="api-container text-box">
			<span id="api-url-display">/api/1080p</span>
			<div class="tooltip-wrapper">
				<span class="tooltip-trigger">🚀 API信息</span>
				<div class="tooltip-card">
					<h3>API Endpoints</h3>
					<ul>
						<li><code>GET /api/1080p</code><br>1080p wallpaper image</li>
						<li><code>GET /api/4k</code><br>4K wallpaper image</li>
						<li><code>GET /api/json</code><br>Wallpaper details (JSON)</li>
					</ul>
				</div>
			</div>
		</div>

		<footer id="footer" class="text-box">
			<div id="copyright"></div>
			<div>Use of this image is restricted to wallpaper only.</div>
			<div>Bing is a trademark of Microsoft. This site is not affiliated with Microsoft.</div>
		</footer>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
